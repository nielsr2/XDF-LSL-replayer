name: Build XDF LSL Replayer

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt (static)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtcharts'

      - name: Configure (static)
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DSTATIC_BUILD=ON `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDFLSLReplayer-Windows
          path: build/Release/XDFLSLReplayer.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtcharts'

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt frameworks into .app bundle
        run: |
          brew install qt
          macdeployqt build/XDFLSLReplayer.app -dmg || true

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDFLSLReplayer-macOS
          path: build/XDFLSLReplayer.app

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: XDFLSLReplayer-Windows
          path: windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: XDFLSLReplayer-macOS
          path: macos

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/XDFLSLReplayer.exe
            macos/XDFLSLReplayer.app
          generate_release_notes: true
