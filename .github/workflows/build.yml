name: Build XDF LSL Replayer

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qtcharts'

      - name: Configure
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt DLLs
        shell: pwsh
        run: |
          $qtBin = "$env:QT_ROOT_DIR/bin"
          $deployDir = "deploy"
          New-Item -ItemType Directory -Path $deployDir -Force
          Copy-Item build/Release/XDFLSLReplayer.exe $deployDir/
          Copy-Item build/Release/lsl.dll $deployDir/ -ErrorAction SilentlyContinue
          Copy-Item build/_deps/liblsl-build/Release/lsl.dll $deployDir/ -ErrorAction SilentlyContinue
          & "$qtBin/windeployqt.exe" "$deployDir/XDFLSLReplayer.exe" --release --no-translations --no-opengl-sw

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDFLSLReplayer-Windows
          path: deploy/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtcharts'

      - name: Configure
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Deploy Qt into .app bundle
        run: |
          $QT_ROOT_DIR/bin/macdeployqt build/XDFLSLReplayer.app || true

      - name: Create zip preserving .app bundle
        run: |
          cd build && zip -r -y ../XDFLSLReplayer-macOS.zip XDFLSLReplayer.app

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: XDFLSLReplayer-macOS
          path: XDFLSLReplayer-macOS.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: XDFLSLReplayer-Windows
          path: XDFLSLReplayer-Windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: XDFLSLReplayer-macOS
          path: XDFLSLReplayer-macOS

      - name: Zip artifacts
        run: |
          cd XDFLSLReplayer-Windows && zip -r ../XDFLSLReplayer-Windows.zip . && cd ..
          cp XDFLSLReplayer-macOS/XDFLSLReplayer-macOS.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            XDFLSLReplayer-Windows.zip
            XDFLSLReplayer-macOS.zip
          generate_release_notes: true
